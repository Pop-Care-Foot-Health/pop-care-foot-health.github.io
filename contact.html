---
layout: default
title: Contact
---

<section class="section page-header">
  <div class="container">
    <h1>Contact Us</h1>
    <p class="section-sub">Have a question? Send us a message and we'll get back to you soon.</p>
  </div>
</section>

<section class="section">
  <div class="container form-wrap">
    <form action="https://formspree.io/f/xaqgvdwe" method="POST" class="site-form">
      <label>
        Name
        <input type="text" name="name" required>
      </label>
      <label>
        Email
        <input type="email" name="email" required>
      </label>
      <label>
        Phone
        <input type="tel" name="phone">
      </label>
      <label>
        Message
        <textarea name="message" rows="5" required></textarea>
      </label>
      <button type="submit" class="btn btn-primary">Send Message</button>
    </form>
  </div>
</section>
